{% extends "base.html" %}
{% block title %}Manage Seasons{% endblock %}
{% block breadcrumb %}Season Management{% endblock %}

{% block content %}
<div id="app-root">Loading...</div>

<script>
const API = '/api/forms';
let token = null;
let allSeasons = [];
let allEvents  = [];

async function apiGet(path) {
    const r = await fetch(API + path, { headers: { Authorization: 'Bearer ' + token } });
    return r.ok ? r.json() : [];
}
async function apiPost(path, body) {
    return fetch(API + path, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
}
async function apiPut(path, body) {
    return fetch(API + path, {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
}
async function apiDelete(path) {
    return fetch(API + path, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + token }
    });
}

function getTokenFromCookie() {
    const match = document.cookie.match(/access_token_cookie=([^;]+)/);
    return match ? match[1] : null;
}

async function loadData() {
    token      = getTokenFromCookie();
    allSeasons = await apiGet('/seasons');
    allEvents  = await apiGet('/events-list');
    render();
}

const STATUS_OPTS = ['planning', 'active', 'closed', 'archived'];

function render() {
    const root = document.getElementById('app-root');
    root.innerHTML = `
      <div style="display:flex; justify-content:flex-end; margin-bottom:20px;">
        <button class="btn" onclick="openCreateModal()">+ New Season</button>
      </div>

      <div class="card">
        <div class="card-header">Seasons</div>
        <div class="table-scroll"><table>
          <thead><tr>
            <th>Year</th><th>Status</th><th>Reg Open</th><th>Start</th><th>End</th><th>Events</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${allSeasons.map(s => `
              <tr>
                <td><strong>${s.year}</strong></td>
                <td>
                  ${ s.status === 'active'   ? '<span class="badge badge-active">Active</span>'
                   : s.status === 'closed'   ? '<span class="badge badge-closed">Closed</span>'
                   : s.status === 'archived' ? '<span class="badge badge-archived">Archived</span>'
                   :                           '<span class="badge badge-planning">Planning</span>' }
                </td>
                <td style="font-family:'IBM Plex Mono',monospace; font-size:13px;">${s.reg_open||'—'}</td>
                <td style="font-family:'IBM Plex Mono',monospace; font-size:13px;">${s.start_date||'—'}</td>
                <td style="font-family:'IBM Plex Mono',monospace; font-size:13px;">${s.end_date||'—'}</td>
                <td>${s.events.map(e => e.name).join(', ') || '—'}</td>
                <td style="display:flex; gap:6px;">
                  <button class="btn btn-sm btn-ghost" onclick="openEditModal(${s.id})">Edit</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteSeason(${s.id}, ${s.year})">Delete</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table></div>
      </div>

      <!-- Create Modal -->
      <div class="overlay" id="createModal">
        <div class="modal" style="max-width:560px; width:95%;">
          <h3>New Season</h3>
          <div class="form-row"><span class="form-label">Year:</span>
            <input type="number" id="newYear" style="width:120px;" placeholder="2026">
          </div>
          <div class="form-row"><span class="form-label">Status:</span>
            <select id="newStatus" style="width:160px;">
              ${STATUS_OPTS.map(s => `<option value="${s}">${s}</option>`).join('')}
            </select>
          </div>
          <div class="form-row"><span class="form-label">Reg Opens:</span>
            <input type="date" id="newRegOpen" style="width:160px;">
          </div>
          <div class="form-row"><span class="form-label">Reg Closes:</span>
            <input type="date" id="newRegClose" style="width:160px;">
          </div>
          <div class="form-row"><span class="form-label">Start:</span>
            <input type="date" id="newStart" style="width:160px;">
          </div>
          <div class="form-row"><span class="form-label">End:</span>
            <input type="date" id="newEnd" style="width:160px;">
          </div>
          <div style="margin-top:16px; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px;">Include Events</div>
          <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;">
            ${allEvents.map(e => `
              <label style="display:flex; align-items:center; gap:6px; font-size:14px; cursor:pointer;">
                <input type="checkbox" class="new-ev-check" value="${e.id}" style="accent-color:var(--blue);">
                ${e.name}
              </label>`).join('')}
          </div>
          <div class="form-actions" style="border-top:none; padding:0;">
            <button class="btn" onclick="createSeason()">Create</button>
            <button class="btn btn-ghost" onclick="closeModal('createModal')">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Edit Modal -->
      <div class="overlay" id="editModal">
        <div class="modal" style="max-width:560px; width:95%;">
          <h3>Edit Season</h3>
          <div id="editFormContent"></div>
          <div class="form-actions" style="border-top:none; padding:0; margin-top:16px;">
            <button class="btn" onclick="saveEdit()">Save</button>
            <button class="btn btn-ghost" onclick="closeModal('editModal')">Cancel</button>
          </div>
        </div>
      </div>
    `;
}

let editingId = null;

function openCreateModal() {
    document.getElementById('createModal').classList.add('active');
}

function openEditModal(id) {
    editingId = id;
    const s = allSeasons.find(x => x.id === id);
    if (!s) return;
    const includedIds = new Set(s.events.map(e => e.id));
    document.getElementById('editFormContent').innerHTML = `
      <div class="form-row"><span class="form-label">Year:</span>
        <input type="number" id="editYear" style="width:120px;" value="${s.year}">
      </div>
      <div class="form-row"><span class="form-label">Status:</span>
        <select id="editStatus" style="width:160px;">
          ${STATUS_OPTS.map(o => `<option value="${o}" ${s.status===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div class="form-row"><span class="form-label">Reg Opens:</span>
        <input type="date" id="editRegOpen" style="width:160px;" value="${s.reg_open||''}">
      </div>
      <div class="form-row"><span class="form-label">Reg Closes:</span>
        <input type="date" id="editRegClose" style="width:160px;" value="${s.reg_close||''}">
      </div>
      <div class="form-row"><span class="form-label">Start:</span>
        <input type="date" id="editStart" style="width:160px;" value="${s.start_date||''}">
      </div>
      <div class="form-row"><span class="form-label">End:</span>
        <input type="date" id="editEnd" style="width:160px;" value="${s.end_date||''}">
      </div>
      <div style="margin-top:16px; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px;">Events</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;">
        ${allEvents.map(e => `
          <label style="display:flex; align-items:center; gap:6px; font-size:14px; cursor:pointer;">
            <input type="checkbox" class="edit-ev-check" value="${e.id}" ${includedIds.has(e.id)?'checked':''} style="accent-color:var(--blue);">
            ${e.name}
          </label>`).join('')}
      </div>
    `;
    document.getElementById('editModal').classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function createSeason() {
    const year = document.getElementById('newYear').value;
    if (!year) { alert('Year is required'); return; }
    const checks = document.querySelectorAll('.new-ev-check:checked');
    const events = Array.from(checks).map(c => ({ event_id: parseInt(c.value), included: true }));
    const body = {
        year:       parseInt(year),
        status:     document.getElementById('newStatus').value,
        reg_open:   document.getElementById('newRegOpen').value  || null,
        reg_close:  document.getElementById('newRegClose').value || null,
        start_date: document.getElementById('newStart').value    || null,
        end_date:   document.getElementById('newEnd').value      || null,
        events,
    };
    const r = await apiPost('/seasons', body);
    if (r.ok) { closeModal('createModal'); loadData(); }
    else { const d = await r.json(); alert(d.error || 'Error'); }
}

async function saveEdit() {
    const checks = document.querySelectorAll('.edit-ev-check');
    const events = Array.from(checks).map(c => ({
        event_id: parseInt(c.value), included: c.checked
    }));
    const body = {
        year:       parseInt(document.getElementById('editYear').value),
        status:     document.getElementById('editStatus').value,
        reg_open:   document.getElementById('editRegOpen').value  || null,
        reg_close:  document.getElementById('editRegClose').value || null,
        start_date: document.getElementById('editStart').value    || null,
        end_date:   document.getElementById('editEnd').value      || null,
        events,
    };
    const r = await apiPut(`/seasons/${editingId}`, body);
    if (r.ok) { closeModal('editModal'); loadData(); }
    else { const d = await r.json(); alert(d.error || 'Error'); }
}

async function deleteSeason(sid, year) {
    if (!confirm(`Delete season ${year}? This will remove all linked data.`)) return;
    const r = await apiDelete(`/seasons/${sid}`);
    if (r.ok) loadData();
    else { const d = await r.json(); alert(d.error || 'Error'); }
}

document.addEventListener('click', e => {
    if (e.target.classList.contains('overlay')) e.target.classList.remove('active');
});

loadData();
</script>
{% endblock %}
