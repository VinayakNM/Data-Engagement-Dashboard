{% extends "base.html" %}
{% block title %}Manage Institutions{% endblock %}
{% block breadcrumb %}Institution Management{% endblock %}

{% block content %}
<div id="app-root">Loading...</div>

<script>
const API = '/api/forms';
let token = null;
let allInsts = [];
let allHR    = [];

async function apiGet(path) {
    const r = await fetch(API + path, { headers: { Authorization: 'Bearer ' + token } });
    return r.ok ? r.json() : [];
}
async function apiPost(path, body) {
    return fetch(API + path, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
}
async function apiPut(path, body) {
    return fetch(API + path, {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
}
async function apiPatch(path, body) {
    return fetch(API + path, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
}
async function apiDelete(path) {
    return fetch(API + path, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + token }
    });
}

function getTokenFromCookie() {
    const match = document.cookie.match(/access_token_cookie=([^;]+)/);
    return match ? match[1] : null;
}

async function loadData() {
    token    = getTokenFromCookie();
    allInsts = await apiGet('/institutions');
    allHR    = await apiGet('/hr-users');
    render();
}

function render() {
    const root = document.getElementById('app-root');
    root.innerHTML = `
      <div style="display:flex; justify-content:flex-end; margin-bottom:20px;">
        <button class="btn" onclick="openCreateModal()">+ New Institution</button>
      </div>

      <div class="card">
        <div class="card-header">Institutions</div>
        <div class="table-scroll"><table>
          <thead><tr>
            <th>Code</th><th>Name</th><th>Contact</th><th>Participants</th><th>HR Users</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${allInsts.map(i => `
              <tr>
                <td><strong style="font-family:'IBM Plex Mono',monospace;">${i.code}</strong></td>
                <td>${i.name}</td>
                <td style="font-size:13px; color:var(--text-muted);">
                  ${i.contact_person||'—'}<br>
                  <a href="mailto:${i.contact_email||''}" style="color:var(--blue);">${i.contact_email||''}</a>
                </td>
                <td>${i.participant_count}</td>
                <td>${i.hr_users.map(u => u.username).join(', ') || '—'}</td>
                <td>
                  ${i.status === 'active'
                    ? '<span class="badge badge-active">Active</span>'
                    : '<span class="badge badge-closed">Inactive</span>'}
                </td>
                <td style="display:flex; gap:6px; flex-wrap:wrap;">
                  <button class="btn btn-sm btn-ghost" onclick="openEditModal(${i.id})">Edit</button>
                  <button class="btn btn-sm btn-ghost" onclick="toggleStatus(${i.id}, '${i.status}')">
                    ${i.status === 'active' ? 'Deactivate' : 'Activate'}
                  </button>
                  <button class="btn btn-sm btn-ghost" onclick="openHRModal(${i.id})">HR</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteInst(${i.id}, '${i.code}')">Delete</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table></div>
      </div>

      <!-- Create Modal -->
      <div class="overlay" id="createModal">
        <div class="modal" style="max-width:500px; width:95%;">
          <h3>New Institution</h3>
          <div class="form-row"><span class="form-label">Code:</span>
            <input type="text" id="newCode" style="width:120px;" placeholder="e.g. CBTT">
          </div>
          <div class="form-row"><span class="form-label">Name:</span>
            <input type="text" id="newName" class="wide" placeholder="Full institution name">
          </div>
          <div class="form-row"><span class="form-label">Contact:</span>
            <input type="text" id="newContact" class="wide" placeholder="Contact person">
          </div>
          <div class="form-row"><span class="form-label">Email:</span>
            <input type="email" id="newEmail" class="wide">
          </div>
          <div class="form-row"><span class="form-label">Phone:</span>
            <input type="text" id="newPhone" class="wide" placeholder="1-868-000-0000">
          </div>
          <div class="form-actions" style="border-top:none; padding:0; margin-top:16px;">
            <button class="btn" onclick="createInst()">Create</button>
            <button class="btn btn-ghost" onclick="closeModal('createModal')">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Edit Modal -->
      <div class="overlay" id="editModal">
        <div class="modal" style="max-width:500px; width:95%;">
          <h3>Edit Institution</h3>
          <div id="editFormContent"></div>
          <div class="form-actions" style="border-top:none; padding:0; margin-top:16px;">
            <button class="btn" onclick="saveEdit()">Save</button>
            <button class="btn btn-ghost" onclick="closeModal('editModal')">Cancel</button>
          </div>
        </div>
      </div>

      <!-- HR Assignment Modal -->
      <div class="overlay" id="hrModal">
        <div class="modal" style="max-width:460px; width:95%;">
          <h3>Manage HR Users</h3>
          <div id="hrModalContent"></div>
          <div class="form-actions" style="border-top:none; padding:0; margin-top:16px;">
            <button class="btn btn-ghost" onclick="closeModal('hrModal')">Close</button>
          </div>
        </div>
      </div>
    `;
}

let editingId = null;
let hrInstId  = null;

function openCreateModal() { document.getElementById('createModal').classList.add('active'); }
function closeModal(id)    { document.getElementById(id).classList.remove('active'); }

function openEditModal(id) {
    editingId = id;
    const i = allInsts.find(x => x.id === id);
    if (!i) return;
    document.getElementById('editFormContent').innerHTML = `
      <div class="form-row"><span class="form-label">Code:</span>
        <input type="text" id="editCode" style="width:120px;" value="${i.code}">
      </div>
      <div class="form-row"><span class="form-label">Name:</span>
        <input type="text" id="editName" class="wide" value="${i.name}">
      </div>
      <div class="form-row"><span class="form-label">Contact:</span>
        <input type="text" id="editContact" class="wide" value="${i.contact_person||''}">
      </div>
      <div class="form-row"><span class="form-label">Email:</span>
        <input type="email" id="editEmail" class="wide" value="${i.contact_email||''}">
      </div>
      <div class="form-row"><span class="form-label">Phone:</span>
        <input type="text" id="editPhone" class="wide" value="${i.phone||''}">
      </div>
    `;
    document.getElementById('editModal').classList.add('active');
}

function openHRModal(id) {
    hrInstId = id;
    const i = allInsts.find(x => x.id === id);
    if (!i) return;
    const assignedIds = new Set(i.hr_users.map(u => u.id));
    const unassigned = allHR.filter(u => !u.institution_id || u.institution_id === id);
    document.getElementById('hrModalContent').innerHTML = `
      <p style="font-size:14px; color:var(--text-muted); margin-bottom:16px;">
        Assign or remove HR users for <strong>${i.name}</strong>.
      </p>
      ${unassigned.length === 0 ? '<p style="color:var(--text-muted); font-size:14px;">No available HR users.</p>' :
        unassigned.map(u => `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">
            <span style="font-family:'IBM Plex Mono',monospace; font-size:14px;">${u.username} <span style="color:var(--text-muted);">(${u.email})</span></span>
            ${assignedIds.has(u.id)
              ? `<button class="btn btn-sm btn-danger" onclick="removeHR(${u.id})">Remove</button>`
              : `<button class="btn btn-sm btn-ghost" onclick="assignHR(${u.id})">Assign</button>`
            }
          </div>`).join('')}
    `;
    document.getElementById('hrModal').classList.add('active');
}

async function createInst() {
    const code = document.getElementById('newCode').value.trim();
    const name = document.getElementById('newName').value.trim();
    if (!code || !name) { alert('Code and Name are required'); return; }
    const r = await apiPost('/institutions', {
        code, name,
        contact_person: document.getElementById('newContact').value.trim() || null,
        contact_email:  document.getElementById('newEmail').value.trim()   || null,
        phone:          document.getElementById('newPhone').value.trim()    || null,
    });
    if (r.ok) { closeModal('createModal'); loadData(); }
    else { const d = await r.json(); alert(d.error || 'Error'); }
}

async function saveEdit() {
    const r = await apiPut(`/institutions/${editingId}`, {
        code:           document.getElementById('editCode').value.trim(),
        name:           document.getElementById('editName').value.trim(),
        contact_person: document.getElementById('editContact').value.trim() || null,
        contact_email:  document.getElementById('editEmail').value.trim()   || null,
        phone:          document.getElementById('editPhone').value.trim()    || null,
    });
    if (r.ok) { closeModal('editModal'); loadData(); }
    else { const d = await r.json(); alert(d.error || 'Error'); }
}

async function toggleStatus(id, current) {
    const newStatus = current === 'active' ? 'inactive' : 'active';
    const r = await apiPatch(`/institutions/${id}/status`, { status: newStatus });
    if (r.ok) loadData();
}

async function assignHR(uid) {
    const r = await apiPost(`/institutions/${hrInstId}/assign-hr`, { user_id: uid });
    if (r.ok) { await loadData(); openHRModal(hrInstId); }
}

async function removeHR(uid) {
    const r = await apiDelete(`/institutions/${hrInstId}/remove-hr/${uid}`);
    if (r.ok) { await loadData(); openHRModal(hrInstId); }
}

async function deleteInst(id, code) {
    if (!confirm(`Delete institution "${code}"?`)) return;
    const r = await apiDelete(`/institutions/${id}`);
    if (r.ok) loadData();
    else { const d = await r.json(); alert(d.error || 'Error'); }
}

document.addEventListener('click', e => {
    if (e.target.classList.contains('overlay')) e.target.classList.remove('active');
});

loadData();
</script>
{% endblock %}
