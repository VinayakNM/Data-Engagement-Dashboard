<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CariFin — Institution Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1923;--ink2:#3d4f5e;--muted:#7a8fa0;--divider:#e4eaef;
  --bg:#f2f5f8;--surface:#fff;--surface2:#f7f9fb;
  --accent:#0066ff;--accent-h:#0052cc;--accent-l:#e6f0ff;
  --green:#00875a;--green-l:#e3fcef;--red:#de350b;--red-l:#ffebe6;
  --orange:#ff8b00;--orange-l:#fffae6;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;min-height:100vh}
.hdr{background:var(--ink);color:#fff;height:54px;display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:100}
.hdr-brand{font-size:15px;font-weight:700;letter-spacing:-.5px}
.hdr-sep{opacity:.3}
.hdr-page{font-size:13px;opacity:.7;font-family:'DM Mono',monospace}
.wrap{padding:28px 32px;max-width:1100px}
.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:6px;font-family:'DM Mono',monospace}
.page-h{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:16px}
.page-actions{display:flex;gap:8px;margin-bottom:20px}

/* table card */
.card{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px}
.card-hdr{padding:12px 18px;border-bottom:1px solid var(--divider);display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.card-hdr-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:9px 16px;text-align:left;border-bottom:1px solid var(--divider);background:var(--surface2)}
td{padding:10px 16px;border-bottom:1px solid var(--divider);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickrow:hover td{background:var(--accent-l);cursor:pointer}
tr.clickrow.sel td{background:var(--accent-l)}
.empty-cell{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.inst-code{font-family:'DM Mono',monospace;font-size:11px;background:var(--accent-l);color:var(--accent);padding:2px 7px;border-radius:4px;font-weight:600}
.inst-name{font-weight:600}
.tbl-action{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:none;display:block;line-height:1.6}
.tbl-action:hover{text-decoration:underline}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge::before{content:'';width:6px;height:6px;border-radius:50%}
.badge-active{background:var(--green-l);color:var(--green)}.badge-active::before{background:var(--green)}
.badge-inactive{background:#f4f5f7;color:var(--muted)}.badge-inactive::before{background:var(--muted)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-h)}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid var(--divider)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--red-l);color:var(--red);border:1.5px solid #ffd5cc}.btn-danger:hover{background:var(--red);color:#fff}
.btn-warn{background:var(--orange-l);color:var(--orange);border:1.5px solid #ffe5b3}.btn-warn:hover{background:var(--orange);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* panel — slides in below table */
.panel{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px;display:none}
.panel.open{display:block}
.panel-hdr{background:var(--ink);color:#fff;padding:13px 20px;display:flex;justify-content:space-between;align-items:center}
.panel-hdr-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.panel-close{background:none;border:none;color:#fff;opacity:.6;font-size:20px;cursor:pointer;line-height:1;padding:0 2px}.panel-close:hover{opacity:1}
.panel-body{padding:24px 28px}
.panel-footer{padding:14px 28px;border-top:1px solid var(--divider);background:var(--surface2);display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* two-col form layout */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 28px}
@media(max-width:700px){.form-grid{grid-template-columns:1fr}}
.field{margin-bottom:16px}
.field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;display:block}
.req{color:var(--red)}
.inp{width:100%;border:1.5px solid var(--divider);border-radius:6px;padding:8px 12px;font-family:inherit;font-size:13px;background:var(--surface);color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,102,255,.1)}
.section-sep{border:none;border-top:1px solid var(--divider);margin:20px 0}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}

/* HR table inside panel */
.sub-tbl{width:100%;border-collapse:collapse;border:1.5px solid var(--divider);border-radius:6px;overflow:hidden;font-size:12px;margin-bottom:10px}
.sub-tbl th{padding:7px 12px;background:var(--surface2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--divider);text-align:left}
.sub-tbl td{padding:8px 12px;border-bottom:1px solid var(--divider);vertical-align:middle}
.sub-tbl tr:last-child td{border-bottom:none}
.assign-row{display:flex;gap:8px;margin-top:8px}
.assign-row select{flex:1;border:1.5px solid var(--divider);border-radius:6px;padding:7px 10px;font-family:inherit;font-size:13px;background:var(--surface);outline:none;transition:border-color .15s}
.assign-row select:focus{border-color:var(--accent)}
.history-list{font-size:12px;color:var(--ink2);list-style:disc;padding-left:18px}
.history-list li{margin-bottom:5px}

/* notices */
.banner{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:16px;display:none}
.banner.err{display:block;background:var(--red-l);border:1px solid #ffd5cc;color:var(--red)}
.banner.ok{display:block;background:var(--green-l);border:1px solid #b3f5d6;color:var(--green)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:11px 18px;font-size:13px;border-left:4px solid var(--accent);border-radius:6px;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-brand">CariFin Data Dashboard</span>
  <span class="hdr-sep">›</span>
  <span class="hdr-page">System › Institution Management</span>
</div>

<div class="wrap">
  <div class="breadcrumb">System / Institution Management</div>
  <div class="page-h">Manage Institutions</div>
  <div class="banner" id="banner"></div>
  <div class="page-actions">
    <button class="btn btn-primary" onclick="openNew()">+ Add New Institution</button>
    <button class="btn btn-ghost" onclick="toast('Select an institution then use the HR assignment panel.')">Assign HR Users</button>
  </div>

  <!-- institutions table -->
  <div class="card">
    <div class="card-hdr">
      <span class="card-hdr-label">Registered Institutions</span>
      <span id="instCount" style="font-size:11px;color:var(--muted)"></span>
    </div>
    <table>
      <thead><tr>
        <th>ID#</th><th>Code</th><th>Name</th><th>Users</th><th>Participants</th><th>Status</th>
      </tr></thead>
      <tbody id="instTbody"><tr><td colspan="6" class="empty-cell">Loading…</td></tr></tbody>
    </table>
  </div>

  <!-- panel appears here, below the table -->
  <div class="panel" id="panel">
    <div class="panel-hdr">
      <span class="panel-hdr-title" id="panelTitle">Add / Edit Institution Form</span>
      <button class="panel-close" onclick="closePanel()">&#x2715;</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
    <div class="panel-footer" id="panelFooter"></div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
var institutions=[], hrUsers=[], selId=null;

function api(url,opts){
  return fetch(url,Object.assign({credentials:'include',headers:{'Content-Type':'application/json'}},opts||{}))
    .then(function(r){
      if(!r.ok) return r.json().catch(function(){return{};}).then(function(e){throw new Error(e.error||'HTTP '+r.status);});
      return r.json();
    });
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m){var t=document.getElementById('toastEl');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3000);}
function banner(m,tp){var el=document.getElementById('banner');el.textContent=m;el.className='banner '+(tp||'err');}
function hideBanner(){document.getElementById('banner').className='banner';}

function load(){
  Promise.all([
    api('/api/forms/institutions'),
    api('/api/forms/hr-users').catch(function(){return[];})
  ]).then(function(r){
    institutions=r[0]; hrUsers=r[1];
    renderList(); hideBanner();
  }).catch(function(e){
    banner('Could not load institutions: '+e.message);
    document.getElementById('instTbody').innerHTML='<tr><td colspan="6" class="empty-cell">Failed to load. Check console.</td></tr>';
  });
}

function renderList(){
  var tb=document.getElementById('instTbody');
  document.getElementById('instCount').textContent=institutions.length+' institution'+(institutions.length!=1?'s':'');
  if(!institutions.length){tb.innerHTML='<tr><td colspan="6" class="empty-cell">No institutions yet. Click + Add New Institution.</td></tr>';return;}
  tb.innerHTML=institutions.map(function(i){
    var st=i.status||'active';
    return '<tr class="clickrow'+(i.id==selId?' sel':'')+'" onclick="selectInst('+i.id+')">'
      +'<td style="color:var(--muted);font-size:12px">'+i.id+'</td>'
      +'<td><span class="inst-code">'+esc(i.code)+'</span></td>'
      +'<td><span class="inst-name">'+esc(i.name)+'</span></td>'
      +'<td>'+i.user_count
        +'<a class="tbl-action" onclick="event.stopPropagation();selectInst('+i.id+')">[Add]</a>'
        +'<a class="tbl-action" onclick="event.stopPropagation();selectInst('+i.id+')">[View Users]</a>'
      +'</td>'
      +'<td>'+i.participant_count
        +'<a class="tbl-action" onclick="event.stopPropagation()">[View Participants]</a>'
      +'</td>'
      +'<td>'
        +'<span class="badge badge-'+st+'">'+st.charAt(0).toUpperCase()+st.slice(1)+'</span>'
        +(st==='active'
          ?'<a class="tbl-action" onclick="event.stopPropagation();quickStatus('+i.id+',\'inactive\')">[Deactivate]</a>'
          :'<a class="tbl-action" onclick="event.stopPropagation();quickStatus('+i.id+',\'active\')">[Activate]</a>'
        )
        +'<a class="tbl-action" onclick="event.stopPropagation();selectInst('+i.id+')">[Edit]</a>'
      +'</td>'
    +'</tr>';
  }).join('');
}

function selectInst(id){
  selId=id; renderList();
  var i=institutions.find(function(x){return x.id==id;});
  if(i) renderForm(i);
  scrollToPanel();
}

function openNew(){selId=null; renderList(); renderForm(null); scrollToPanel();}

function scrollToPanel(){
  setTimeout(function(){
    document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'start'});
  },50);
}

function renderForm(inst){
  var isNew=!inst;
  document.getElementById('panelTitle').textContent=isNew?'Add New Institution':'Edit Institution — '+esc(inst?inst.code:'');
  document.getElementById('panel').classList.add('open');

  var code=inst?inst.code:'', name=inst?inst.name:'';
  var cp=inst?inst.contact_person||'':'';
  var ce=inst?inst.contact_email||'':'';
  var ph=inst?inst.phone||'':'';

  // HR users assigned
  var assignedHR=inst?inst.hr_users||[]:[];
  var hrRows=assignedHR.length
    ?assignedHR.map(function(u,idx){
        return '<tr>'
          +'<td style="color:var(--muted)">'+((inst?inst.id:'')+'_U'+(idx+1))+'</td>'
          +'<td>'+esc(u.username)+'</td>'
          +'<td style="color:var(--muted)">'+esc(u.email)+'</td>'
          +'<td><button class="btn btn-ghost btn-sm" onclick="removeHR('+inst.id+','+u.id+')">[Remove]</button></td>'
        +'</tr>';
      }).join('')
    :'<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:12px;font-size:12px">No HR users assigned.</td></tr>';

  var availHR=hrUsers.filter(function(u){return !u.institution_id;});
  var assignSel=inst
    ?'<div class="assign-row">'
      +'<select id="hrAssignSel"><option value="">— Select HR user —</option>'
        +availHR.map(function(u){return '<option value="'+u.id+'">'+esc(u.username)+' ('+esc(u.email)+')</option>';}).join('')
      +'</select>'
      +'<button class="btn btn-ghost btn-sm" onclick="assignHR('+inst.id+')">Assign</button>'
    +'</div>'
    :'<p style="font-size:12px;color:var(--muted)">Save the institution first, then assign HR users.</p>';

  // History
  var hist=inst&&inst.participation_history?inst.participation_history:[];
  var histHtml=hist.length
    ?'<ul class="history-list">'+hist.map(function(h){return '<li>'+h.year+': '+h.registered+' registered</li>';}).join('')+'</ul>'
    :'<p style="font-size:12px;color:var(--muted)">No participation data yet.</p>';

  document.getElementById('panelBody').innerHTML=
    '<div class="form-grid">'
      +'<div class="field"><label class="field-label">Institution Code <span class="req">*</span></label>'
        +'<input class="inp" id="iCode" value="'+esc(code)+'" placeholder="e.g. CBTT" style="text-transform:uppercase"></div>'
      +'<div class="field"><label class="field-label">Institution Name <span class="req">*</span></label>'
        +'<input class="inp" id="iName" value="'+esc(name)+'" placeholder="e.g. Central Bank of Trinidad and Tobago"></div>'
      +'<div class="field"><label class="field-label">Contact Person</label>'
        +'<input class="inp" id="iCP" value="'+esc(cp)+'" placeholder="e.g. Johnson Doe"></div>'
      +'<div class="field"><label class="field-label">Contact Email</label>'
        +'<input class="inp" id="iCE" type="email" value="'+esc(ce)+'" placeholder="e.g. hr@institution.org"></div>'
      +'<div class="field"><label class="field-label">Phone</label>'
        +'<input class="inp" id="iPN" value="'+esc(ph)+'" placeholder="e.g. 1-868-XXX-XXXX"></div>'
    +'</div>'
    +(inst
      ?'<hr class="section-sep">'
       +'<div class="section-label">HR User Assignment</div>'
       +'<table class="sub-tbl"><thead><tr><th>ID#</th><th>Username</th><th>Email</th><th>Action</th></tr></thead>'
         +'<tbody>'+hrRows+'</tbody></table>'
       +assignSel
       +'<hr class="section-sep">'
       +'<div class="section-label">Participation History</div>'
       +histHtml
      :''
    );

  document.getElementById('panelFooter').innerHTML=
    '<button class="btn btn-primary" id="saveBtn" onclick="saveInst('+(inst?inst.id:'')+')">Save Institution</button>'
    +'<button class="btn btn-ghost" onclick="closePanel()">Cancel</button>'
    +(inst&&inst.status==='active'
      ?'<button class="btn btn-warn" onclick="quickStatus('+inst.id+',\'inactive\')">Deactivate</button>'
      :(inst?'<button class="btn btn-ghost" onclick="quickStatus('+inst.id+',\'active\')">Activate</button>':'')
    )
    +(inst?'<button class="btn btn-danger" style="margin-left:auto" onclick="deleteInst('+inst.id+')">Delete</button>':'');
}

function saveInst(id){
  var code=(document.getElementById('iCode').value||'').trim().toUpperCase();
  var name=(document.getElementById('iName').value||'').trim();
  if(!code||!name){toast('⚠ Code and Name are required.');return;}
  var body={code:code,name:name,
    contact_person:document.getElementById('iCP').value.trim()||null,
    contact_email:document.getElementById('iCE').value.trim()||null,
    phone:document.getElementById('iPN').value.trim()||null};
  var btn=document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='Saving…';
  var p=!id
    ?api('/api/forms/institutions',{method:'POST',body:JSON.stringify(body)})
    :api('/api/forms/institutions/'+id,{method:'PUT',body:JSON.stringify(body)});
  p.then(function(r){
    toast('✓ Institution saved.'); selId=r.id; return load();
  }).then(function(){
    var i=institutions.find(function(x){return x.id==selId;});
    if(i) renderForm(i);
  }).catch(function(e){banner('Save failed: '+e.message);})
  .finally(function(){var b=document.getElementById('saveBtn');if(b){b.disabled=false;b.textContent='Save Institution';}});
}

function quickStatus(id,status){
  api('/api/forms/institutions/'+id+'/status',{method:'PATCH',body:JSON.stringify({status:status})})
    .then(function(){toast('✓ Status updated.');return load();})
    .then(function(){var i=institutions.find(function(x){return x.id==id;});if(i)renderForm(i);})
    .catch(function(e){banner(e.message);});
}

function assignHR(iid){
  var sel=document.getElementById('hrAssignSel');
  var uid=parseInt(sel&&sel.value);
  if(!uid){toast('⚠ Select an HR user first.');return;}
  api('/api/forms/institutions/'+iid+'/assign-hr',{method:'POST',body:JSON.stringify({user_id:uid})})
    .then(function(){toast('✓ HR user assigned.');return load();})
    .then(function(){var i=institutions.find(function(x){return x.id==iid;});if(i)renderForm(i);})
    .catch(function(e){banner(e.message);});
}

function removeHR(iid,uid){
  if(!confirm('Remove this HR user from the institution?')) return;
  api('/api/forms/institutions/'+iid+'/remove-hr/'+uid,{method:'DELETE'})
    .then(function(){toast('✓ Removed.');return load();})
    .then(function(){var i=institutions.find(function(x){return x.id==iid;});if(i)renderForm(i);})
    .catch(function(e){banner(e.message);});
}

function deleteInst(id){
  var i=institutions.find(function(x){return x.id==id;});
  if(!confirm('Delete "'+((i&&i.name)||id)+'"? This cannot be undone.')) return;
  api('/api/forms/institutions/'+id,{method:'DELETE'})
    .then(function(){toast('✓ Deleted.');selId=null;closePanel();return load();})
    .catch(function(e){banner('Delete failed: '+e.message);});
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  selId=null; renderList();
}

load();
</script>
</body>
</html>
