services:
  - type: web
    name: carifin-dashboard
    env: python
    repo: https://github.com/JasMintTea/Data-Engagement-Dashboard.git
    plan: free
    branch: main
    healthCheckPath: /health
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: SQLALCHEMY_DATABASE_URI
        value: sqlite:///carifin.db
      - key: JWT_SECRET_KEY
        generateValue: true